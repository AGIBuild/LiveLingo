schema: spec-driven

context: |
  Tech stack: .NET 10, Avalonia 11, C#, ONNX Runtime, LLamaSharp
  Architecture: LiveLingo.Core (reusable business logic) + LiveLingo.App (UI shell + platform)
  Platforms: Windows (Win32 P/Invoke) + macOS (CoreGraphics, AXUIElement)
  Domain: Desktop real-time translation input plugin for Slack/Teams/Discord
  AI Models: MarianMT (translation, ONNX), Qwen2.5-1.5B (post-processing, GGUF/LLamaSharp)
  Pattern: MVVM (CommunityToolkit.Mvvm), DI (Microsoft.Extensions.DependencyInjection)
  Existing: PoC completed with Windows text injection (SendInput + WM_CHAR fallback)
  Reference docs: docs/poc-design.md, docs/product-design.md, docs/roadmap.md

rules:
  proposal:
    - Reference existing docs/proposals/ and docs/proposals/specs/ for detailed context
    - Keep proposals focused on a single deliverable milestone
  specs:
    - Include C# interface signatures and data models
    - Define error handling and edge cases
  design:
    - Include class diagrams or dependency graphs where applicable
    - Define DI registration strategy
  tasks:
    - Each task should be completable in 1-4 hours
    - Include acceptance criteria per task
